<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="SET Analyze - Technical Analysis specialist for SET stocks. Real-time indicators, trend evaluations, and AI-powered trading signals."
    />
    <title>{% block title %}SET Analyze{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: {
                50: '#ecfdf5',
                100: '#d1fae5',
                200: '#a7f3d0',
                300: '#6ee7b7',
                400: '#34d399',
                500: '#10b981',
                600: '#059669',
                700: '#047857',
                800: '#065f46',
                900: '#064e3b',
                950: '#022c22',
              },
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Outfit', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <!-- Flowbite CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body
    class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col selection:bg-emerald-100 selection:text-emerald-800"
  >
    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 px-4 py-3 sticky top-0 z-50">
      <div class="flex flex-wrap justify-between items-center mx-auto max-w-5xl">
        <a href="/" class="flex items-center gap-2 group">
          <div
            class="w-8 h-8 rounded-lg bg-gradient-to-tr from-emerald-500 to-teal-400 flex items-center justify-center shadow-md shadow-emerald-500/10 group-hover:scale-105 transition-transform"
          >
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M2.25 18L9 11.25l4.306 4.307a11.95 11.95 0 015.814-5.519l2.74-1.22m0 0l-5.94-2.28m5.94 2.28l-2.28 5.941"
              ></path>
            </svg>
          </div>
          <span
            class="self-center text-xl font-bold font-display whitespace-nowrap text-slate-900 group-hover:text-emerald-600 transition-colors"
            >SET Analyze</span
          >
        </a>
        <button
          data-collapse-toggle="mobile-menu"
          type="button"
          class="inline-flex items-center p-2 ml-3 text-sm text-slate-500 rounded-lg md:hidden hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-slate-200"
          aria-controls="mobile-menu"
          aria-expanded="false"
          id="mobile-menu-btn"
        >
          <span class="sr-only">Open main menu</span>
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
            <path
              fill-rule="evenodd"
              d="M3 5a1 0 011-1h12a1 0 110 2H4a1 0 01-1-1zM3 10a1 0 011-1h12a1 0 110 2H4a1 0 01-1-1zM3 15a1 0 011-1h12a1 0 110 2H4a1 0 01-1-1z"
              clip-rule="evenodd"
            ></path>
          </svg>
        </button>
        <div class="hidden w-full md:block md:w-auto" id="mobile-menu">
          <ul class="flex flex-col mt-4 md:flex-row md:space-x-8 md:mt-0 md:text-sm md:font-medium">
            <li>
              <a
                href="/"
                class="block py-2 pr-4 pl-3 rounded md:bg-transparent md:p-0 transition-colors {% if active == 'dashboard' %}text-emerald-600 font-semibold{% else %}text-slate-600 hover:text-slate-900{% endif %}"
                id="nav-dashboard"
                >Dashboard</a
              >
            </li>
            <li>
              <a
                href="/portfolio"
                class="block py-2 pr-4 pl-3 rounded md:bg-transparent md:p-0 transition-colors {% if active == 'portfolio' %}text-emerald-600 font-semibold{% else %}text-slate-600 hover:text-slate-900{% endif %}"
                id="nav-portfolio"
                >Portfolio</a
              >
            </li>
            <li>
              <a
                href="/analysis"
                class="block py-2 pr-4 pl-3 rounded md:bg-transparent md:p-0 transition-colors {% if active == 'analysis' %}text-emerald-600 font-semibold{% else %}text-slate-600 hover:text-slate-900{% endif %}"
                id="nav-analysis"
                >Analyse</a
              >
            </li>
            <li>
              <a
                href="/history"
                class="block py-2 pr-4 pl-3 rounded md:bg-transparent md:p-0 transition-colors {% if active == 'history' %}text-emerald-600 font-semibold{% else %}text-slate-600 hover:text-slate-900{% endif %}"
                id="nav-history"
                >History</a
              >
            </li>
            <li>
              <a
                href="/config"
                class="block py-2 pr-4 pl-3 rounded md:bg-transparent md:p-0 transition-colors {% if active == 'config' %}text-emerald-600 font-semibold{% else %}text-slate-600 hover:text-slate-900{% endif %}"
                id="nav-config"
                >Config</a
              >
            </li>
            <li>
              <a
                href="/docs"
                target="_blank"
                class="block py-2 pr-4 pl-3 text-slate-400 hover:text-slate-600 rounded md:bg-transparent md:p-0 transition-colors"
                id="nav-api"
                >API</a
              >
            </li>
            {% if auth_enabled %}
            <li>
              <a
                href="/logout"
                class="block py-2 pr-4 pl-3 text-rose-600 hover:text-rose-700 rounded md:bg-transparent md:p-0 transition-colors font-medium"
                id="nav-logout"
                >Logout</a
              >
            </li>
            {% endif %}
          </ul>
        </div>
      </div>
    </nav>

    <main class="flex-grow max-w-5xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
      {% if message %}
      <div
        id="alert-success"
        class="flex items-center p-4 mb-6 text-emerald-800 rounded-lg bg-emerald-50 border border-emerald-200"
        role="alert"
      >
        <svg
          class="flex-shrink-0 w-4 h-4"
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          fill="currentColor"
          viewBox="0 0 20 20"
        >
          <path
            d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.707 8.207-4 4a1 1 0 0 1-1.414 0l-2-2a1 1 0 0 1 1.414-1.414L9 10.586l3.293-3.293a1 1 0 0 1 1.414 1.414Z"
          />
        </svg>
        <span class="sr-only">Success</span>
        <div class="ms-3 text-sm font-medium">{{ message }}</div>
        <button
          type="button"
          class="ms-auto -mx-1.5 -my-1.5 rounded-lg focus:ring-2 p-1.5 inline-flex items-center justify-center h-8 w-8 bg-emerald-50 text-emerald-500 hover:bg-emerald-100"
          data-dismiss-target="#alert-success"
          aria-label="Close"
          id="close-alert-success"
        >
          <span class="sr-only">Close</span>
          <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"
            />
          </svg>
        </button>
      </div>
      {% endif %} {% if error %}
      <div
        id="alert-error"
        class="flex items-center p-4 mb-6 text-rose-800 rounded-lg bg-rose-50 border border-rose-200"
        role="alert"
      >
        <svg
          class="flex-shrink-0 w-4 h-4"
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          fill="currentColor"
          viewBox="0 0 20 20"
        >
          <path
            d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM10 15a1 1 0 1 1 0-2 1 1 0 0 1 0 2Zm1-4a1 1 0 0 1-2 0V6a1 1 0 0 1 2 0v5Z"
          />
        </svg>
        <span class="sr-only">Error</span>
        <div class="ms-3 text-sm font-medium">{{ error }}</div>
        <button
          type="button"
          class="ms-auto -mx-1.5 -my-1.5 rounded-lg focus:ring-2 p-1.5 inline-flex items-center justify-center h-8 w-8 bg-rose-50 text-rose-500 hover:bg-rose-100"
          data-dismiss-target="#alert-error"
          aria-label="Close"
          id="close-alert-error"
        >
          <span class="sr-only">Close</span>
          <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"
            />
          </svg>
        </button>
      </div>
      {% endif %} {% block content %}{% endblock %}
    </main>

    <!-- Flowbite JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.js"></script>
  </body>
</html>
